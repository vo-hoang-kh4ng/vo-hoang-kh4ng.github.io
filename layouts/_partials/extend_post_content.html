<p class="post-view-count" style="color: var(--secondary); font-size: 14px; margin-top: 1em;">
  <span id="goatcounter-count">Đang tải lượt xem…</span>
</p>
<script>
  window.addEventListener('load', function () {
    var el = document.getElementById('goatcounter-count');
    var path = location.pathname;
    fetch('https://kh4ng-blog.goatcounter.com/counter/' + encodeURIComponent(path).replace(/%2F/g, '/') + '.json')
      .then(function (res) {
        if (!res.ok) { throw new Error('no data'); }
        return res.json();
      })
      .then(function (data) {
        var count = (data.count || '0').replace(/[^\d]/g, '') || '0';
        el.textContent = count + ' lượt xem';
      })
      .catch(function () {
        el.textContent = 'Chưa có lượt xem';
      });
  });
</script>
